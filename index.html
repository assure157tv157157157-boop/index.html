<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha IA Gemini</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    padding: 15px;
    background: #1e293b;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

#chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    margin-bottom: 15px;
    padding: 10px 15px;
    border-radius: 10px;
    max-width: 80%;
    word-wrap: break-word;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #334155;
    align-self: flex-start;
}

#input-area {
    display: flex;
    padding: 10px;
    background: #1e293b;
}

#input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 16px;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #2563eb;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<header>🤖 Minha IA Gemini</header>

<div id="chat"></div>

<div id="input-area">
    <input type="text" id="input" placeholder="Digite sua mensagem..." />
    <button onclick="sendMessage()">Enviar</button>
</div>

<script>

const API_KEY = "AIzaSyBtimoOs3nYRyvjbLI7bP6GysW3P0D2vJU";

const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

const chat = document.getElementById("chat");
let conversationHistory = [];

function addMessage(text, sender) {
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    addMessage("Digitando...", "bot");

    conversationHistory.push({
        role: "user",
        parts: [{ text: text }]
    });

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                contents: conversationHistory
            })
        });

        const data = await response.json();

        chat.removeChild(chat.lastChild);

        let botReply = data.candidates?.[0]?.content?.parts?.[0]?.text 
            || "Erro ao gerar resposta.";

        addMessage(botReply, "bot");

        conversationHistory.push({
            role: "model",
            parts: [{ text: botReply }]
        });

    } catch (error) {
        chat.removeChild(chat.lastChild);
        addMessage("Erro ao conectar com a IA.", "bot");
        console.error(error);
    }
}

document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

</script>

</body>
</html>
